<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSC IO Command Center - Tableau Extension</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #extension-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: #f7f9fb;
            font-family: 'Inter', sans-serif;
            z-index: 1000;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #003366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-text {
            color: #001e40;
            font-size: 14px;
            font-weight: 500;
        }
        #error {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            background: #f7f9fb;
            font-family: 'Inter', sans-serif;
        }
        #error.visible { display: flex; }
        .error-icon { font-size: 48px; color: #ba1a1a; }
        .error-msg { color: #001e40; font-size: 14px; max-width: 400px; text-align: center; line-height: 1.5; }
        .retry-btn {
            margin-top: 8px;
            padding: 8px 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .retry-btn:hover { background: #001e40; }

        /* Navigation bar for switching views */
        #nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #001e40;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 4px;
            z-index: 100;
        }
        #nav-bar a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        #nav-bar a:hover { color: white; background: rgba(255,255,255,0.1); }
        #nav-bar a.active { color: white; background: rgba(255,255,255,0.15); }
        #extension-frame { margin-top: 40px; height: calc(100% - 40px); }
    </style>
</head>
<body>
    <!-- Loading State -->
    <div id="loading">
        <div class="spinner"></div>
        <span class="load-text">Initializing IO Command Center Extension...</span>
    </div>

    <!-- Error State -->
    <div id="error">
        <span class="error-icon">&#9888;</span>
        <p class="error-msg">Unable to initialize the Tableau Extension. Please ensure you're running this inside a Tableau Dashboard.</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
        <p class="error-msg" style="margin-top:12px; font-size:12px; color:#666;">Standalone mode: Loading dashboard directly...</p>
    </div>

    <!-- View Navigation -->
    <div id="nav-bar" style="display:none;">
        <a href="#" data-page="index.html" class="active">Dashboard</a>
        <a href="#" data-page="clinical-trials.html">Clinical Trials</a>
        <a href="#" data-page="metrics.html">Metrics</a>
        <a href="#" data-page="logistics.html">Logistics</a>
        <a href="#" data-page="patient-outcomes.html">Patient Outcomes</a>
    </div>

    <!-- Extension Content -->
    <iframe id="extension-frame" style="display:none;"></iframe>

    <!-- Tableau Extensions API -->
    <script src="https://cdn.jsdelivr.net/gh/nicktableau/extensions-api@master/lib/tableau.extensions.1.latest.min.js"></script>

    <script>
        const BASE_PATH = '/bsc-io-command-center/';
        const frame = document.getElementById('extension-frame');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const navBar = document.getElementById('nav-bar');

        function showDashboard(page) {
            frame.src = BASE_PATH + page;
            frame.style.display = 'block';
            navBar.style.display = 'flex';
            loading.classList.add('hidden');

            document.querySelectorAll('#nav-bar a').forEach(a => {
                a.classList.toggle('active', a.dataset.page === page);
            });
        }

        function initExtension() {
            if (typeof tableau !== 'undefined' && tableau.extensions) {
                tableau.extensions.initializeAsync().then(function() {
                    console.log('Tableau Extension initialized successfully');
                    showDashboard('index.html');
                }, function(err) {
                    console.warn('Tableau init failed:', err);
                    fallbackToStandalone();
                });
            } else {
                fallbackToStandalone();
            }
        }

        function fallbackToStandalone() {
            console.log('Running in standalone mode (outside Tableau)');
            showDashboard('index.html');
        }

        // Navigation handlers
        document.querySelectorAll('#nav-bar a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                showDashboard(this.dataset.page);
            });
        });

        // Initialize after short delay to allow Tableau API to load
        setTimeout(initExtension, 500);
    </script>
</body>
</html>
